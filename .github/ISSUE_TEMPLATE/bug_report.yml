name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code snippet or steps to reproduce the issue.
      render: csharp
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AutoWire version
      placeholder: e.g. 1.18.0
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: e.g. .NET 9
    validations:
      required: true
